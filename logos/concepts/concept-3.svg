<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="tileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF5F6"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F43F5E"/>
      <stop offset="1" stop-color="#E11D48"/>
    </linearGradient>
  </defs>

  <g id="tile">
    <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#tileGrad)"/>
    <rect x="16.5" y="16.5" width="479" height="479" rx="111.5" fill="none" stroke="#B81A3C" stroke-opacity="0.10" stroke-width="1"/>
  </g>

  <g id="mark" fill="none" stroke="url(#letterGrad)" stroke-width="58" stroke-linecap="round" stroke-linejoin="round">
    <!-- C: generous open circular arc, gap on the right. Cap height 176..336 -->
    <path d="M 234 213 A 80 80 0 1 0 234 339"/>
    <!-- P stem: same cap height & baseline as C (176 top, 336 bottom) -->
    <path d="M 312 336 L 312 176"/>
    <!-- P bowl: round bowl, same monoline weight -->
    <path d="M 312 176 L 360 176 A 52 52 0 0 1 360 280 L 312 280"/>
  </g>
</svg>
